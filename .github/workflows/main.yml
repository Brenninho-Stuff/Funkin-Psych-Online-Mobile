name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: false
        default: release
        type: choice
        options: [release, debug]
        
env:
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
  NDK_VERSION: "25.2.9519653"       # r25b — versão estável comprovada para hxcpp
  HAXE_VERSION: "4.3.4"
  JAVA_VERSION: "17"

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java (Gradle exige 17+) ─────────────────────────────────────────
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # ── 3. Haxe ────────────────────────────────────────────────────────────
      - name: Setup Haxe ${{ env.HAXE_VERSION }}
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      # ── 4. Android SDK ─────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r25 + build-tools
        run: |
          sdkmanager --install \
            "ndk;${{ env.NDK_VERSION }}" \
            "build-tools;34.0.0" \
            "platforms;android-33"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"         >> $GITHUB_ENV

      # ── 5. Cache Gradle (seguro — não envolve hxcpp) ──────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 6. Haxelibs ────────────────────────────────────────────────────────
      # NÃO cacheia ~/.haxelib para evitar conflitos de versão do hxcpp.
      # O hmm.json pina hxcpp em 4.3.2 — qualquer cache stale quebra o build.
      - name: Setup haxelib dir
        run: haxelib setup ~/haxelib

      - name: Install hmm
        run: haxelib install hmm --quiet

      # hxcpp é instalado ANTES do hmm install para garantir a versão exata (4.3.2).
      # O hmm vai skip se já estiver instalado na versão certa.
      - name: Install hxcpp 4.3.2 (pinned)
        run: haxelib install hxcpp 4.3.2 --quiet

      - name: Install all deps via hmm
        run: haxelib run hmm install

      # Verifica que o hxcpp não foi sobrescrito por uma versão diferente
      - name: Verify hxcpp version
        run: haxelib list | grep hxcpp

      # ── 7. Configura lime para Android ─────────────────────────────────────
      - name: Configure lime Android paths
        run: |
          haxelib run lime config ANDROID_SDK     "$ANDROID_SDK_ROOT"
          haxelib run lime config ANDROID_NDK_ROOT "$ANDROID_NDK_HOME"
          haxelib run lime config JAVA_HOME        "$JAVA_HOME"
          # Confirma config aplicada
          haxelib run lime config

      # ── 8. Build ───────────────────────────────────────────────────────────
      - name: Build Android (${{ env.BUILD_TYPE }})
        run: haxelib run lime build android -${{ env.BUILD_TYPE }}

      # ── 9. Assinatura (opcional — só roda se os secrets estiverem definidos) ─
      - name: Sign APK
        if: >
          env.BUILD_TYPE == 'release' &&
          secrets.KEYSTORE_BASE64 != '' &&
          secrets.KEY_ALIAS       != '' &&
          secrets.KEY_STORE_PASS  != '' &&
          secrets.KEY_PASS        != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASS:  ${{ secrets.KEY_STORE_PASS }}
          KEY_PASS:        ${{ secrets.KEY_PASS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.jks

          # Localiza o APK gerado pelo Gradle
          APK=$(find export/release/android/bin/app/build/outputs/apk \
                  -name "*.apk" | head -1)
          echo "APK encontrado: $APK"

          # Assina com apksigner (já no PATH via setup-android)
          apksigner sign \
            --ks             /tmp/release.jks \
            --ks-key-alias   "$KEY_ALIAS" \
            --ks-pass        "pass:$KEY_STORE_PASS" \
            --key-pass       "pass:$KEY_PASS" \
            --out            export/release/android/PsychOnline-signed.apk \
            "$APK"

          apksigner verify export/release/android/PsychOnline-signed.apk
          echo "APK_PATH=export/release/android/PsychOnline-signed.apk" >> $GITHUB_ENV

      # Caminho fallback (unsigned) se signing não rodou
      - name: Locate APK (unsigned fallback)
        if: env.APK_PATH == ''
        run: |
          APK=$(find export/${{ env.BUILD_TYPE }}/android/bin/app/build/outputs/apk \
                  -name "*.apk" | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "APK unsigned: $APK"

      # ── 10. Upload artifact ────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PsychOnline-Android-${{ env.BUILD_TYPE }}-${{ github.sha }}
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 14